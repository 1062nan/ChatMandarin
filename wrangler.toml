name = "chatmandarin"
compatibility_date = "2024-12-01"
pages_build_output_dir = ".next"

# Cloudflare KV（用于 session 缓存和限流）
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"

# Cloudflare R2（音频文件存储）
[[r2_buckets]]
binding = "R2"
bucket_name = "chatmandarin-audio"

# Cloudflare Queues（HSKK 异步评分）
[[queues.producers]]
queue = "hskk-grading"
binding = "HSKK_QUEUE"

[[queues.consumers]]
queue = "hskk-grading"
max_batch_size = 1
max_batch_timeout = 30

# 环境变量（在 Cloudflare Pages Dashboard → Settings → Environment variables 设置）
# 这里只放非敏感的
[vars]
NEXT_PUBLIC_APP_URL = "https://chatmandarin.cc"
NEXT_PUBLIC_APP_NAME = "ChatMandarin"

# 敏感变量（API keys 等）必须用 Cloudflare Secrets（dashboard 加密存储）：
# wrangler pages secret put DEEPSEEK_API_KEY
# wrangler pages secret put VOLCENGINE_APP_ID
# wrangler pages secret put VOLCENGINE_ACCESS_TOKEN
# wrangler pages secret put LEMONSQUEEZY_API_KEY
# wrangler pages secret put LEMONSQUEEZY_WEBHOOK_SECRET
# wrangler pages secret put SUPABASE_SERVICE_ROLE_KEY
# wrangler pages secret put RESEND_API_KEY
