<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- 背景：米白 -->
  <rect width="1200" height="630" fill="#f8f5f0"/>

  <!-- 左侧朱砂红印章 -->
  <g transform="translate(80, 215)">
    <circle cx="100" cy="100" r="100" fill="#c23b22"/>
    <circle cx="100" cy="100" r="85" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <text x="100" y="140" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', 'STSong', serif" font-size="120" font-weight="700" fill="#fff">汉</text>
  </g>

  <!-- 右侧标题 -->
  <text x="320" y="280" font-family="Inter, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#1a1a1a" letter-spacing="-2">
    ChatMandarin
  </text>
  <text x="320" y="350" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#6b6b6b">
    AI tutor for HSK learners.
  </text>
  <text x="320" y="400" font-family="Inter, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#6b6b6b">
    Speak Mandarin from day 1.
  </text>

  <!-- 底部 CTA 文字 -->
  <text x="320" y="500" font-family="Inter, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#c23b22">
    chatmandarin.cc
  </text>

  <!-- 装饰：右侧朱砂红小印章 -->
  <g transform="translate(1050, 80)" opacity="0.8">
    <circle cx="40" cy="40" r="35" fill="none" stroke="#c23b22" stroke-width="3"/>
    <text x="40" y="52" text-anchor="middle" font-family="'Noto Serif SC', 'Songti SC', serif" font-size="32" font-weight="700" fill="#c23b22">語</text>
  </g>
</svg>
